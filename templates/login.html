<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BAM Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="upload-container login-card">

    <h1>TPSODL Login</h1>

    <p>Authorized access only.</p>

    {% if message %}
    <div class="message error-message">
        {{ message }}
    </div>
    {% endif %}

    <form method="POST"
          action="{{ url_for('login') }}"
          class="login-form">

        <label for="username">Username</label>

        <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            required
        >

        <label for="password">Password</label>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
